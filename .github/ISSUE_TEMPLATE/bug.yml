name: Bug report
description: Report a reproducible Platform Zero defect
title: "[bug] "
labels: [bug]
body:
  - type: input
    id: module
    attributes:
      label: Affected module
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Release or commit
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction and sanitized diagnostics
    validations:
      required: true
