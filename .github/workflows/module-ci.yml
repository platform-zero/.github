name: Reusable module CI

on:
  workflow_call:
    inputs:
      generator_ref:
        description: Immutable sso-stack-generator commit used for validation
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    name: Module validation
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out module
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install shell tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck

      - name: Check out shared module runner
        env:
          GENERATOR_REF: ${{ inputs.generator_ref }}
        run: |
          [[ "$GENERATOR_REF" =~ ^[0-9a-f]{40}$ ]]
          git init -q "$RUNNER_TEMP/sso-stack-generator"
          git -C "$RUNNER_TEMP/sso-stack-generator" remote add origin https://github.com/platform-zero/sso-stack-generator.git
          git -C "$RUNNER_TEMP/sso-stack-generator" fetch --depth 1 origin "$GENERATOR_REF"
          git -C "$RUNNER_TEMP/sso-stack-generator" checkout --detach FETCH_HEAD

      - name: Run complete module validation
        run: |
          "$RUNNER_TEMP/sso-stack-generator/scripts/test-module.sh" --all "$GITHUB_WORKSPACE"
