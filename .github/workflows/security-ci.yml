name: Reusable security CI

on:
  workflow_call:

permissions:
  contents: read

jobs:
  secrets:
    name: Secret scanning
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install verified Gitleaks CLI
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          curl -fsSLO "$base/$archive"
          curl -fsSLO "$base/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          grep "  $archive$" "gitleaks_${GITLEAKS_VERSION}_checksums.txt" | sha256sum -c -
          tar -xzf "$archive" gitleaks
          install -m 0755 gitleaks "$RUNNER_TEMP/gitleaks"
      - name: Scan current pull-request changes for secrets
        if: github.event_name == 'pull_request'
        run: |
          "$RUNNER_TEMP/gitleaks" git --redact --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
      - name: Scan pushed commit for secrets
        if: github.event_name != 'pull_request'
        run: |
          "$RUNNER_TEMP/gitleaks" git --redact --log-opts="-1 ${{ github.sha }}"

  dependencies:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Reject newly introduced vulnerable dependencies
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high

  filesystem:
    name: Vulnerability baseline
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Scan filesystem
        uses: anchore/scan-action@1638637db639e0ade3258b51db49a9a137574c3e # v6
        with:
          path: .
          fail-build: false
          severity-cutoff: high
          output-format: table

  sbom:
    name: SBOM
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          artifact-name: ${{ github.event.repository.name }}-sbom.spdx.json
